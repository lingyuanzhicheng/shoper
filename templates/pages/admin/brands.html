{{define "content_admin_brands"}}
                <div class="admin-shell">
                    <div class="page-header"><div><h2 class="page-header-title">品牌管理</h2><p class="page-header-desc">管理品牌 Logo、名称与简介。</p></div></div>
                    <div class="cat-masonry brand-masonry">
                        {{range .AllBrands}}
                        <div class="brand-card">
                            <div class="brand-logo-wrap">{{if .Logo}}<img src="{{.Logo}}" alt="{{.Name}}">{{else}}<span>品</span>{{end}}</div>
                            <div class="brand-card-main"><div class="brand-card-name">{{.Name}}</div><div class="brand-card-desc">{{if .Description}}{{.Description}}{{else}}暂无介绍{{end}}</div></div>
                            <div class="brand-card-actions"><button type="button" onclick="openBrandModal(this)" data-id="{{.ID}}" data-name="{{.Name}}" data-logo="{{.Logo}}" data-description="{{.Description}}" aria-label="编辑品牌"><i class="sui-Markpencilcontrol"></i></button><form method="post" action="/admin/brands"><input type="hidden" name="delete_id" value="{{.ID}}"><button type="button" onclick="window.confirmAction('确认删除', '确定要删除品牌「{{.Name}}」吗？', 'danger').then(function(ok){ if(ok) this.closest('form').submit(); }.bind(this))" aria-label="删除品牌"><i class="sui-Trashcancontrol"></i></button></form></div>
                        </div>
                        {{end}}
                        <button type="button" class="brand-add-card" onclick="openBrandModal()"><span class="cat-create-tile-icon">+</span><span>添加品牌</span></button>
                    </div>
                    {{template "pagination" .}}
                </div>
{{end}}
